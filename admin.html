<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Pantalla Gigante</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #4facfe;
        }

        .stat-label {
            margin-top: 10px;
            opacity: 0.8;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: #667eea;
        }

        .tab-btn:hover {
            background: rgba(102, 126, 234, 0.7);
        }

        .photos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .photo-card {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s;
        }

        .photo-card:hover {
            transform: translateY(-5px);
        }

        .photo-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .photo-info {
            padding: 15px;
        }

        .photo-description {
            margin-bottom: 10px;
            color: #ddd;
        }

        .photo-meta {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 10px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-approve {
            background: #4caf50;
            color: white;
        }

        .btn-reject {
            background: #f44336;
            color: white;
        }

        .btn-delete {
            background: #ff9800;
            color: white;
        }

        .btn:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            margin-top: 20px;
        }

        .url-box {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .url-box input {
            flex: 1;
            padding: 10px;
            background: white;
            border: none;
            border-radius: 5px;
            font-family: monospace;
        }

        .btn-copy {
            background: #4caf50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .photos-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <script src="storage.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 Panel de Moderación</h1>
            <p>Administra las fotos que se mostrarán en la pantalla gigante</p>
        </div>

        <div class="stats-grid" id="statsGrid"></div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="pendientes">📋 Pendientes</button>
            <button class="tab-btn" data-tab="aprobadas">✅ Aprobadas</button>
            <button class="tab-btn" data-tab="rechazadas">❌ Rechazadas</button>
            <button class="tab-btn" data-tab="todas">📁 Todas</button>
        </div>

        <div class="url-box">
            <span>🔗 URL para pantalla gigante:</span>
            <input type="text" id="pantallaUrl" readonly>
            <button class="btn-copy" onclick="copyUrl()">📋 Copiar</button>
        </div>

        <div id="photosContainer" class="photos-grid"></div>
    </div>

    <script>
        let currentTab = 'pendientes';
        
        function updateStats() {
            const stats = photoStorage.getStats();
            const statsGrid = document.getElementById('statsGrid');
            
            statsGrid.innerHTML = `
                <div class="stat-card">
                    <div class="stat-number">${stats.total}</div>
                    <div class="stat-label">Total Fotos</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${stats.pendientes}</div>
                    <div class="stat-label">Pendientes</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${stats.aprobadas}</div>
                    <div class="stat-label">Aprobadas</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${stats.rechazadas}</div>
                    <div class="stat-label">Rechazadas</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${stats.aprobadasHoy}</div>
                    <div class="stat-label">Aprobadas Hoy</div>
                </div>
            `;
        }
        
        function renderPhotos() {
            let photos = [];
            
            switch(currentTab) {
                case 'pendientes':
                    photos = photoStorage.getPhotosByStatus('pendiente');
                    break;
                case 'aprobadas':
                    photos = photoStorage.getPhotosByStatus('aprobada');
                    break;
                case 'rechazadas':
                    photos = photoStorage.getPhotosByStatus('rechazada');
                    break;
                case 'todas':
                    photos = photoStorage.getAllPhotos();
                    break;
            }
            
            // Ordenar por fecha descendente
            photos.sort((a, b) => b.fecha - a.fecha);
            
            const container = document.getElementById('photosContainer');
            
            if (photos.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        📭 No hay fotos en esta categoría
                    </div>
                `;
                return;
            }
            
            container.innerHTML = photos.map(photo => `
                <div class="photo-card" data-id="${photo.id}">
                    <img src="${photo.url}" alt="Foto">
                    <div class="photo-info">
                        ${photo.description ? `<div class="photo-description">📝 ${escapeHtml(photo.description)}</div>` : ''}
                        <div class="photo-meta">
                            📅 ${new Date(photo.fecha).toLocaleString()}<br>
                            📄 ${photo.nombre}<br>
                            ${photo.fechaModeracion ? `🕒 Moderado: ${new Date(photo.fechaModeracion).toLocaleString()}` : ''}
                        </div>
                        <div class="button-group">
                            ${photo.estado === 'pendiente' ? `
                                <button class="btn btn-approve" onclick="approvePhoto(${photo.id})">✅ Aprobar</button>
                                <button class="btn btn-reject" onclick="rejectPhoto(${photo.id})">❌ Rechazar</button>
                            ` : `
                                <button class="btn btn-delete" onclick="deletePhoto(${photo.id})">🗑️ Eliminar</button>
                            `}
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        window.approvePhoto = function(photoId) {
            if (confirm('¿Aprobar esta foto? Aparecerá en la pantalla gigante.')) {
                photoStorage.updatePhotoStatus(photoId, 'aprobada');
                renderPhotos();
                updateStats();
            }
        };
        
        window.rejectPhoto = function(photoId) {
            if (confirm('¿Rechazar esta foto?')) {
                photoStorage.updatePhotoStatus(photoId, 'rechazada');
                renderPhotos();
                updateStats();
            }
        };
        
        window.deletePhoto = function(photoId) {
            if (confirm('¿Eliminar esta foto permanentemente?')) {
                photoStorage.deletePhoto(photoId);
                renderPhotos();
                updateStats();
            }
        };
        
        function copyUrl() {
            const urlInput = document.getElementById('pantallaUrl');
            urlInput.select();
            document.execCommand('copy');
            alert('✅ URL copiada al portapapeles');
        }
        
        // Configurar tabs
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTab = btn.dataset.tab;
                renderPhotos();
            });
        });
        
        // Configurar URL de pantalla
        const pantallaUrl = window.location.href.replace('admin.html', 'pantalla.html');
        document.getElementById('pantallaUrl').value = pantallaUrl;
        
        // Escuchar actualizaciones
        photoStorage.onUpdate(() => {
            renderPhotos();
            updateStats();
        });
        
        // Inicializar
        updateStats();
        renderPhotos();
    </script>
</body>
</html>
