<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pantalla Gigante - Modo Proyección</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .screen-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #000 0%, #1a1a1a 100%);
        }

        #current-photo {
            max-width: 100vw;
            max-height: 100vh;
            width: auto;
            height: auto;
            object-fit: contain;
            transition: opacity 0.8s ease-in-out;
            box-shadow: 0 0 50px rgba(255,255,255,0.2);
            border-radius: 10px;
        }

        .info-overlay {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            backdrop-filter: blur(5px);
            z-index: 10;
        }

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            z-index: 20;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .photo-description {
            margin-top: 5px;
            font-size: 12px;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            .info-overlay {
                font-size: 10px;
                bottom: 10px;
            }
        }
    </style>
    <script src="storage.js"></script>
</head>
<body>
    <div class="screen-container">
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Cargando pantalla gigante...</p>
        </div>
        <img id="current-photo" alt="Esperando fotos..." style="opacity: 0;">
        <div class="info-overlay">
            🖼️ PANTALLA GIGANTE | Actualización automática
            <div id="photo-info" class="photo-description"></div>
        </div>
    </div>

    <script>
        const imgElement = document.getElementById('current-photo');
        const loadingDiv = document.getElementById('loading');
        const photoInfo = document.getElementById('photo-info');
        let currentPhotoId = null;
        
        function updateDisplay() {
            const lastPhoto = photoStorage.getLastApprovedPhoto();
            
            if (!lastPhoto) {
                if (!loadingDiv.style.display === 'none') {
                    loadingDiv.style.display = 'flex';
                }
                imgElement.style.opacity = '0';
                photoInfo.textContent = '📺 Esperando la primera foto aprobada...';
                return;
            }
            
            // Solo actualizar si es una foto nueva
            if (currentPhotoId !== lastPhoto.id) {
                loadingDiv.style.display = 'none';
                currentPhotoId = lastPhoto.id;
                
                // Efecto fade
                imgElement.style.opacity = '0';
                
                setTimeout(() => {
                    imgElement.src = lastPhoto.url;
                    imgElement.alt = lastPhoto.description || 'Foto en pantalla';
                    
                    if (lastPhoto.description) {
                        photoInfo.innerHTML = `📝 ${escapeHtml(lastPhoto.description)}`;
                    } else {
                        photoInfo.innerHTML = '';
                    }
                    
                    imgElement.style.opacity = '1';
                }, 300);
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Escuchar cambios en el almacenamiento
        photoStorage.onUpdate(() => {
            updateDisplay();
        });
        
        // También escuchar cambios en localStorage (para pestañas múltiples)
        window.addEventListener('storage', (e) => {
            if (e.key === photoStorage.STORAGE_KEY) {
                updateDisplay();
            }
        });
        
        // Inicializar
        setTimeout(() => {
            updateDisplay();
        }, 100);
        
        // Prevenir que la pantalla se apague (solicitar wake lock)
        if ('wakeLock' in navigator) {
            let wakeLock = null;
            
            const requestWakeLock = async () => {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Wake Lock activado');
                } catch (err) {
                    console.log('Wake Lock no soportado:', err);
                }
            };
            
            requestWakeLock();
            
            // Recuperar wake lock cuando la página se vuelve visible
            document.addEventListener('visibilitychange', () => {
                if (wakeLock !== null && document.visibilityState === 'visible') {
                    requestWakeLock();
                }
            });
        }
    </script>
</body>
</html>
